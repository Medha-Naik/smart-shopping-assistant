<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Results | PricePulse</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='result.css') }}">
  <style>
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .sort-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sort-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-right: 4px;
      letter-spacing: 0.04em;
    }
    .sort-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 99px;
      color: var(--text-secondary);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: all var(--transition);
    }
    .sort-btn svg {
      width: 11px; height: 11px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .sort-btn:hover { border-color: var(--border-hover); color: var(--text-primary); }
    .sort-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">Price<span>Pulse</span></a>
    <div style="display:flex;gap:8px;align-items:center;">
      <a href="/wishlist" class="icon-btn">
        <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        Wishlist
      </a>
      <a href="/" class="icon-btn">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </a>
    </div>
  </nav>

  <div class="results-container">
    <div class="toolbar">
      <div></div>
      <div class="sort-group">
        <span class="sort-label">Sort by price</span>
        <button class="sort-btn active" data-sort="asc" onclick="sortResults('asc')">
          <svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
          Low to high
        </button>
        <button class="sort-btn" data-sort="desc" onclick="sortResults('desc')">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
          High to low
        </button>
      </div>
    </div>

    <div id="results">
      <div class="loading-state">Searching across all stores…</div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='result.js') }}"></script>
</body>
</html>
