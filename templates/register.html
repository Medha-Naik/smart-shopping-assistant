<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | PricePulse</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>
<body>

  <nav class="navbar">
    <a href="/" class="logo">Price<span>Pulse</span></a>
    <a href="/" class="icon-btn">
      <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </a>
  </nav>

  <div class="auth-page">
    <div class="auth-container">
      <h2>Create account</h2>
      <p class="auth-subtitle">Start tracking prices for free</p>

      {% if error %}<div class="auth-error">{{ error }}</div>{% endif %}

      <form id="register-form" action="/register" method="POST">
        <input type="text" name="username" placeholder="Username" required autocomplete="username">
        <input type="email" name="email" placeholder="Email address" required autocomplete="email">
        <input type="password" name="password" placeholder="Password" required autocomplete="new-password">
        <button type="button" onclick="sendOtp()">Create Account</button>
        <div id="otp-section" style="display: none;">
          <input type="text" id="otp-input" placeholder="Enter 6 digit OTP" maxlength="6">
          <button type="button" onclick="verifyOtp()">Verify OTP</button>
        </div>

      </form>
      
      <div class="auth-divider">or</div>

      <a href="{{ url_for('auth.google_login') }}" class="google-btn">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </a>

      <div class="auth-footer">Already have an account? <a href="/login">Sign in</a></div>
    </div>
  </div>
</body>
<script>
  function sendOtp(){
    const email=document.querySelector('input[name="email"]').value;
    fetch('/send-otp',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email})
    })
    .then(res=>res.json())
    .then(data=>{
      if(data.success){
        document.getElementById('otp-section').style.display='block';
      }
    });
  }

  function verifyOtp(){
    const otp=document.getElementById('otp-input').value;
    fetch('/verify-otp',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({otp})
    })
    .then(res=>res.json())
    .then(data=>{
      if(data.success){
        document.getElementById('register-form').submit();

      }else{
        alert(data.error);
        
      }
    })
  }
</script>
</html>
