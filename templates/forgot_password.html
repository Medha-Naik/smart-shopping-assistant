<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | PricePulse</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>
<body>

  <nav class="navbar">
    <a href="/" class="logo">Price<span>Pulse</span></a>
    <a href="/login" class="icon-btn">
      <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </a>
  </nav>

  <div class="auth-page">
    <div class="auth-container">
      <h2>Reset password</h2>
      <p class="auth-subtitle">We'll send an OTP to your email</p>

      <div id="stage-1">
        <input type="email" id="reset-email" placeholder="Email address">
        <button type="button" onclick="sendResetOtp()">Send OTP</button>
      </div>

      <div id="stage-2" style="display:none;">
        <input type="text" id="reset-otp" placeholder="Enter 6 digit OTP" maxlength="6">
        <button type="button" onclick="verifyResetOtp()">Verify OTP</button>
      </div>

      <div id="stage-3" style="display:none;">
        <input type="password" id="new-password" placeholder="New password">
        <button type="button" onclick="resetPassword()">Reset Password</button>
      </div>

    </div>
  </div>
<script src="{{ url_for('static', filename='auth.js') }}"></script>
</body>
</html>
